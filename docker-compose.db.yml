# ==============================================================================
# Docker Compose for MySQL Database - db_korektor_buku
# ==============================================================================
# 
# DEPLOY ORDER (PENTING - urutannya harus sesuai):
# 1. docker network create cekta-db-network
# 2. docker compose -f docker-compose.db.yml up -d
# 3. docker compose -f docker-compose.yml up -d --build
# ==============================================================================

services:
  mysql-korektor:
    image: mysql:8.0
    container_name: db-korektor-buku
    restart: always
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-db_korektor_buku}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_HOST: "%"
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0
    volumes:
      - mysql_korektor_data:/var/lib/mysql
    networks:
      - cekta-db-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  cekta-db-network:
    name: cekta-db-network
    driver: bridge

volumes:
  mysql_korektor_data:
    name: cekta_mysql_korektor_data