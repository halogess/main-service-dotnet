<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        #messages { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; margin: 10px 0; }
        .message { margin: 5px 0; padding: 5px; background: #f0f0f0; }
        .status_changed { background: #d4edda; }
        .dokumen_cancelled { background: #f8d7da; }
        .queue_position_changed { background: #d1ecf1; }
        input, button { padding: 8px; margin: 5px; }
    </style>
</head>
<body>
    <h1>WebSocket Test</h1>
    
    <div>
        <input type="text" id="token" placeholder="Paste access_token here" style="width: 500px;">
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
    </div>
    
    <div>
        <strong>Status:</strong> <span id="status">Disconnected</span>
    </div>
    
    <div id="messages"></div>
    
    <script>
        let ws = null;
        
        function connect() {
            const token = document.getElementById('token').value;
            if (!token) {
                alert('Please enter token');
                return;
            }
            
            const wsUrl = `ws://localhost:5062/ws?token=${token}`;
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').style.color = 'green';
                addMessage('system', 'WebSocket connected');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                addMessage(data.type, JSON.stringify(data, null, 2));
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                addMessage('error', 'WebSocket error - check console');
            };
            
            ws.onclose = (event) => {
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('status').style.color = 'red';
                addMessage('system', `WebSocket disconnected - Code: ${event.code}, Reason: ${event.reason || 'No reason'}`);
            };
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }
        
        function addMessage(type, text) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;
            messageDiv.innerHTML = `<strong>[${new Date().toLocaleTimeString()}] ${type}:</strong><br><pre>${text}</pre>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
