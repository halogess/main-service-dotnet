services:
  main-service:
    container_name: main-service-dotnet
    build: .
    ports:
      - "5062:5062"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=5062
      - STORAGE_PATH=/app/storage
      - DOKUMEN_IMPORT_HOST_PATH=${DOKUMEN_IMPORT_SOURCE_HOST_PATH}
      - DOKUMEN_IMPORT_CONTAINER_PATH=/app/import-source
      - ConnectionStrings__SttsDbConnection=${ConnectionStrings__SttsDbConnection}
      - ConnectionStrings__KorektorBukuDbConnection=${ConnectionStrings__KorektorBukuDbConnection}
      - Auth__JwtSecret=${Auth__JwtSecret}
      - Auth__AccessTokenExpiryMinutes=${Auth__AccessTokenExpiryMinutes}
      - Auth__RefreshTokenExpiryDays=${Auth__RefreshTokenExpiryDays}
      - Auth__AdminUsername=${Auth__AdminUsername}
      - Auth__ExternalApiUrl=${Auth__ExternalApiUrl}
      - Auth__ExternalApiToken=${Auth__ExternalApiToken}
      - Auth__AppName=${Auth__AppName}
      - Adobe__ClientId=${Adobe__ClientId}
      - Adobe__ClientSecret=${Adobe__ClientSecret}
      - Adobe__TokenUrl=${Adobe__TokenUrl}
      - Adobe__ApiBaseUrl=${Adobe__ApiBaseUrl}
      - InternalApiKey=${InternalApiKey}
      - Logging__LogLevel__Default=${Logging__LogLevel__Default}
      - Logging__LogLevel__Microsoft__AspNetCore=${Logging__LogLevel__MicrosoftAspNetCore}
      - Gemini__Model=${Gemini__Model}
      - Gemini__StructuredModel=${Gemini__StructuredModel}
      - Gemini__FallbackModel=${Gemini__FallbackModel}
      - Gemini__ApiBaseUrl=${Gemini__ApiBaseUrl}
      - Gemini__Temperature=${Gemini__Temperature}
      - Gemini__TopP=${Gemini__TopP}
      - Gemini__TopK=${Gemini__TopK}
      - Gemini__MaxOutputTokens=${Gemini__MaxOutputTokens}
      - Gemini__MaxRetries=${Gemini__MaxRetries}
      - Gemini__RetryDelaySeconds=${Gemini__RetryDelaySeconds}
      - Gemini__DefaultRateLimitDelaySeconds=${Gemini__DefaultRateLimitDelaySeconds}
      - Gemini__TokensPerMinutePerKeyLimit=${Gemini__TokensPerMinutePerKeyLimit}
      - Gemini__TokenWindowSeconds=${Gemini__TokenWindowSeconds}
      - Gemini__CacheHours=${Gemini__CacheHours}
      - Gemini__MaxParseAttempts=${Gemini__MaxParseAttempts}
      - Gemini__ParseRetryDelaySeconds=${Gemini__ParseRetryDelaySeconds}
      - Gemini__BatchSize=${Gemini__BatchSize}
      - Gemini__BatchDelaySeconds=${Gemini__BatchDelaySeconds}
      - Gemini__MaxParallelBatches=${Gemini__MaxParallelBatches}
      - Gemini__MaxBatchRetries=${Gemini__MaxBatchRetries}
      - Gemini__EnableLlm=${Gemini__EnableLlm}
      - AllowedHosts=${AllowedHosts}
    volumes:
      - "${VOLUME_BASE_PATH}:/app/storage"
      - "${DOKUMEN_IMPORT_SOURCE_HOST_PATH}:/app/import-source:ro"
    networks:
      - validasi-ta-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # AI Service (uncomment when ready)
  # ai-service:
  #   container_name: ai-service
  #   image: ai-service:latest
  #   volumes:
  #     - ${VOLUME_BASE_PATH}:/app/storage
  #   networks:
  #     - validasi-ta-network

networks:
  validasi-ta-network:
    driver: bridge
