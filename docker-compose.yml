services:
  mysql-korektor:
    image: mysql:8.0
    container_name: db-korektor-buku
    restart: always
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-root-password}
      MYSQL_DATABASE: ${DB_NAME:-db_korektor_buku}
      MYSQL_USER: ${DB_USER:-korektor_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me-app-password}
      MYSQL_ROOT_HOST: "%"
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0
    volumes:
      - mysql_korektor_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  main-service:
    build: .
    container_name: main-service-dotnet
    restart: always
    depends_on:
      mysql-korektor:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "5062:5062"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 5062
      STORAGE_PATH: /app/storage
      DOKUMEN_IMPORT_HOST_PATH: ${DOKUMEN_IMPORT_SOURCE_HOST_PATH:-/srv/cekta/import-source}
      DOKUMEN_IMPORT_CONTAINER_PATH: /app/import-source
      ConnectionStrings__KorektorBukuDbConnection: Server=mysql-korektor;Port=3306;Database=${DB_NAME:-db_korektor_buku};User=${DB_USER:-korektor_app};Password=${DB_PASSWORD:-change-me-app-password};TreatTinyAsBoolean=false
    volumes:
      - ${STORAGE_HOST_PATH:-/srv/cekta/storage}:/app/storage
      - ${DOKUMEN_IMPORT_SOURCE_HOST_PATH:-/srv/cekta/import-source}:/app/import-source:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_korektor_data:
